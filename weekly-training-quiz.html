<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Weekly Training Quiz</title>

<style>

body{
font-family:Arial;
background:#111;
color:white;
margin:0;
padding:20px;
}

.container{
max-width:800px;
margin:auto;
}

button{
background:#00ff9d;
border:none;
padding:12px 18px;
font-size:16px;
cursor:pointer;
margin-top:10px;
}

.card{
background:#1b1b1b;
padding:20px;
border-radius:8px;
margin-top:20px;
}

.option{
padding:12px;
background:#222;
margin:8px 0;
cursor:pointer;
border-radius:6px;
}

.option:hover{
background:#333;
}

.correct{
background:#006d3c !important;
}

.wrong{
background:#8a0000 !important;
}

</style>
</head>

<body>

<div class="container">

<h1>Weekly Training Quiz</h1>

<div id="quiz"></div>

<button id="nextBtn" style="display:none;">Next Question</button>

<div id="result"></div>

</div>

<script>

const WORKER_URL = "https://tight-waterfall-1040.mathudcarter.workers.dev"

let questions=[]
let current=0
let score=0

async function loadQuestions(){

const res=await fetch(`${WORKER_URL}/api/quiz/questions`)
const data=await res.json()

questions=data.records.map(r=>r.fields)

startQuiz()

}

function startQuiz(){

current=0
score=0

showQuestion()

}

function showQuestion(){

const q=questions[current]

let answers=[]

if(q.WrongAnswer){

answers=q.WrongAnswer.split(",")
answers.push(q.CorrectAnswer)

}else{

answers=[q.CorrectAnswer]

}

answers=shuffle(answers)

let html=`<div class="card">
<h2>${q.Question}</h2>
`

answers.forEach(a=>{
html+=`<div class="option" onclick="selectAnswer(this,'${a}','${q.CorrectAnswer}')">${a}</div>`
})

html+=`</div>`

document.getElementById("quiz").innerHTML=html

document.getElementById("nextBtn").style.display="none"

}

function selectAnswer(el,selected,correct){

let options=document.querySelectorAll(".option")

options.forEach(o=>o.onclick=null)

if(selected===correct){

el.classList.add("correct")
score++

}else{

el.classList.add("wrong")

options.forEach(o=>{
if(o.innerText===correct){
o.classList.add("correct")
}
})

}

document.getElementById("nextBtn").style.display="block"

}

document.getElementById("nextBtn").onclick=function(){

current++

if(current>=questions.length){

showResult()

}else{

showQuestion()

}

}

function showResult(){

document.getElementById("quiz").innerHTML=""

document.getElementById("nextBtn").style.display="none"

document.getElementById("result").innerHTML=
`<div class="card">
<h2>Score: ${score} / ${questions.length}</h2>
<button onclick="startQuiz()">Restart</button>
</div>`

saveResult()

}

async function saveResult(){

await fetch(`${WORKER_URL}/api/quiz/results`,{
method:"POST",
headers:{
"Content-Type":"application/json"
},
body:JSON.stringify({
score:score,
total:questions.length,
date:new Date().toISOString()
})
})

}

function shuffle(arr){

for(let i=arr.length-1;i>0;i--){
const j=Math.floor(Math.random()*(i+1))
;[arr[i],arr[j]]=[arr[j],arr[i]]
}

return arr

}

loadQuestions()

</script>

</body>
</html>
